<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện ảnh có thể truy cập</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Thư viện ảnh kì quan thiên nhiên Việt Nam</h1>
        <p>Sử dụng phím Tab để di chuyển giữa các ảnh</p>
    </header>

<main>
<div class="gallery">

    <figure tabindex="0">
    <img src="https://cdn.vntrip.vn/cam-nang/wp-content/uploads/2020/03/sapa-ruong-bac-thang.jpg"
         alt="Ruộng Bậc Thang"
         tabindex="0"
         onmouseover="upDate(this)"
         onmouseleave="undo()"
         onfocus="upDate(this)"
         onblur="undo()">
    </figure>     

    <figure tabindex="0">
    <img src="https://tse3.mm.bing.net/th/id/OIP.0JlPRrnj92AgMULtF6jWYwHaE8?pid=Api&P=0&h=180"
         alt="Vịnh Hạ Long"
         tabindex="0"
         onmouseover="upDate(this)"
         onmouseleave="undo()"
         onfocus="upDate(this)"
         onblur="undo()">
    </figure>   

    <figure tabindex="0">
    <img src="https://vcdn1-dulich.vnecdn.net/2020/11/26/ban-gioc-CB-Xuan-Truong-1606364517.jpg?w=1200&h=0&q=100&dpr=1&fit=crop&s=xXr6u7mmj5ILpFrJhyl3Yw"
         alt="Thác Bản Giốc"
         tabindex="0"
         onmouseover="upDate(this)"
         onmouseleave="undo()"
         onfocus="upDate(this)"
         onblur="undo()">
    </figure>

    <figure tabindex="0">
    <img src="https://tse1.mm.bing.net/th/id/OIP.Hfb0tHMLF4fP2qp7BTEM6wHaE8?pid=Api&P=0&h=180"
         alt="Hang Sơn Đòong"
         tabindex="0"
         onmouseover="upDate(this)"
         onmouseleave="undo()"
         onfocus="upDate(this)"
         onblur="undo()">
    </figure>

    <figure tabindex="0">
    <img src="https://tse4.mm.bing.net/th/id/OIP.SaJ1TWntMRzox1u2QECsZAHaE8?pid=Api&P=0&h=180"
         alt="Cột Cờ Lũng Cú"
         tabindex="0"
         onmouseover="upDate(this)"  
         onmouseleave="undo()"
         onfocus="upDate(this)"
         onblur="undo()"> 
    </figure>

</div>
</main>

<script src="script.js"></script>

</body>
</html>
